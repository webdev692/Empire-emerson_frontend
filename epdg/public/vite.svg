<svg width="200" height="200" viewBox="0 0 200 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>EE monogram logo</title>
  <desc>Gold interlocking double-E monogram on deep purple background</desc>
  <rect width="200" height="200" rx="16" fill="#1a0a2e"/>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d070"/>
      <stop offset="30%" stop-color="#c8960c"/>
      <stop offset="60%" stop-color="#e8b84b"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>
  </defs>
  <g transform="translate(100,100)">
    <g transform="translate(-44,0)">
      <rect x="-5" y="-54" width="10" height="108" rx="2" fill="url(#gold)"/>
      <rect x="-5" y="-54" width="48" height="10" rx="2" fill="url(#gold)"/>
      <rect x="-5" y="-5" width="38" height="10" rx="2" fill="url(#gold)"/>
      <rect x="-5" y="44" width="48" height="10" rx="2" fill="url(#gold)"/>
    </g>
    <g transform="translate(12,12)">
      <rect x="-5" y="-54" width="10" height="108" rx="2" fill="url(#gold)"/>
      <rect x="-5" y="-54" width="48" height="10" rx="2" fill="url(#gold)"/>
      <rect x="-5" y="-5" width="38" height="10" rx="2" fill="url(#gold)"/>
      <rect x="-5" y="44" width="48" height="10" rx="2" fill="url(#gold)"/>
    </g>
  </g>
</svg>
