name: Deploy EPDG Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'EPDG-Landing-Page/**'
      - '.github/workflows/deploy-epdg.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.23.1
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Setup npm 11.17.0
        working-directory: EPDG-Landing-Page
        run: npm install --global npm@11.17.0 --ignore-scripts --no-audit --no-fund

      - name: Install
        working-directory: EPDG-Landing-Page
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: EPDG-Landing-Page
        run: npm run build

      - name: Lint
        working-directory: EPDG-Landing-Page
        run: npm run lint

      - name: Run targeted smoke checks
        working-directory: EPDG-Landing-Page
        run: npm run smoke

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./EPDG-Landing-Page/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
