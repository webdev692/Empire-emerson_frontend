name: EPDG Build Check

on:
  pull_request:
    paths:
      - "epdg/**"
      - ".github/workflows/epdg-build-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: epdg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: epdg/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build EPDG platform
        run: npm run build
