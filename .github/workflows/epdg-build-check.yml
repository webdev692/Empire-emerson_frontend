name: EPDG Build Check

on:
  pull_request:
    paths:
      - "epdg/**"
      - ".github/workflows/epdg-build-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: epdg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: epdg/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Capture EPDG build output
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build-output.log 2>&1
          BUILD_EXIT_CODE=$?
          echo "exit_code=$BUILD_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epdg-build-diagnostics
          path: epdg/build-output.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when build fails
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "EPDG build failed. Review the epdg-build-diagnostics artifact."
          exit 1
